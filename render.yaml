services:
  - type: web
    name: aices-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: AICES_DB_PATH
        value: /tmp/aices.db
      - key: ALLOWED_ORIGINS
        value: https://your-aices-frontend-url.vercel.app,http://localhost:5173,http://127.0.0.1:5173
    healthCheckPath: /health
